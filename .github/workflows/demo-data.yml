name: Rebuild demo data

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: demo-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rebuild:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: Generate and validate demo data
        run: |
          python pipeline/seed_mock_data.py
          python pipeline/scorer.py
          python pipeline/rank_picks.py
          python pipeline/validate_data.py
      - name: Commit demo data
        shell: bash
        run: |
          git config user.name "polititrade-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data
          git diff --cached --quiet && exit 0
          git commit -m "chore(data): rebuild demo signals"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            echo "Push attempt ${attempt}/3 conflicted; retrying"
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 10))
          done
          exit 1
