name: Refresh data and score

on:
  schedule:
    # 11:17 UTC is 6:17 a.m. EST / 7:17 a.m. EDT. GitHub cron is always UTC.
    - cron: '17 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: polititrade-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: polititrade
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: polititrade/pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: Fetch sources with retries
        shell: bash
        env:
          BARGO_API_KEY: ${{ secrets.BARGO_API_KEY }}
        run: |
          retry() {
            local attempt
            for attempt in 1 2 3; do
              "$@" && return 0
              echo "Attempt ${attempt}/3 failed: $*"
              sleep $((attempt * 10))
            done
            return 1
          }
          retry python pipeline/fetch_congress.py
          retry python pipeline/fetch_prices.py
          retry python pipeline/fetch_news.py
      - name: Score only after every fetch succeeds
        run: |
          python pipeline/scorer.py
          python pipeline/rank_picks.py
          python pipeline/validate_data.py --production
      - name: Commit and push generated data
        shell: bash
        run: |
          git config user.name "polititrade-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/public/data pipeline/data/trades_history.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(data): refresh live signals"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            echo "Push attempt ${attempt}/3 conflicted; retrying"
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 10))
          done
          exit 1
